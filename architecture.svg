<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3" flood-color="#000"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bg)" rx="16"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.3" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="720" fill="url(#grid)" rx="16"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700" letter-spacing="2">⚡ EPOCHSTREAM — SYSTEM ARCHITECTURE</text>
  <text x="600" y="68" text-anchor="middle" fill="#64748b" font-size="12" letter-spacing="1">Universal M2M Payment Router powered by HashKey Settlement Protocol (HSP)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 1: Frontend + Backend + HSP Gateway                -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Box 1: Agent A (Frontend) -->
  <rect x="40" y="110" width="260" height="200" rx="12" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)" opacity="0.95"/>
  <rect x="40" y="110" width="260" height="36" rx="12" fill="#06b6d4" fill-opacity="0.15"/>
  <rect x="40" y="134" width="260" height="1" fill="#06b6d4" fill-opacity="0.3"/>
  <circle cx="62" cy="128" r="5" fill="#06b6d4"/>
  <text x="78" y="132" fill="#22d3ee" font-size="13" font-weight="700" letter-spacing="1">AGENT A — BUYER UI</text>
  <text x="60" y="162" fill="#94a3b8" font-size="11">🌐 Next.js 14 Dashboard</text>
  <text x="60" y="182" fill="#94a3b8" font-size="11">📡 3-column live terminal view</text>
  <text x="60" y="202" fill="#94a3b8" font-size="11">⚡ DeFi Trading Signals</text>
  <text x="60" y="222" fill="#94a3b8" font-size="11">🚗 IoT EV Charging (DePIN)</text>
  <text x="60" y="242" fill="#94a3b8" font-size="11">🤖 AI Compute (SaaS)</text>
  <text x="60" y="268" fill="#475569" font-size="10" font-style="italic">Deployed on Vercel</text>
  <text x="60" y="282" fill="#475569" font-size="9">epoch-stream.vercel.app</text>

  <!-- Box 2: Epochstream Backend -->
  <rect x="470" y="110" width="260" height="200" rx="12" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)" opacity="0.95"/>
  <rect x="470" y="110" width="260" height="36" rx="12" fill="#f59e0b" fill-opacity="0.15"/>
  <rect x="470" y="134" width="260" height="1" fill="#f59e0b" fill-opacity="0.3"/>
  <circle cx="492" cy="128" r="5" fill="#f59e0b"/>
  <text x="508" y="132" fill="#fbbf24" font-size="13" font-weight="700" letter-spacing="1">EPOCHSTREAM BACKEND</text>
  <text x="490" y="162" fill="#94a3b8" font-size="11">🔒 HMAC-SHA256 request signing</text>
  <text x="490" y="182" fill="#94a3b8" font-size="11">🔑 ES256K JWT generation</text>
  <text x="490" y="202" fill="#94a3b8" font-size="11">📋 Cart Mandate builder (RFC 8785)</text>
  <text x="490" y="222" fill="#94a3b8" font-size="11">🎫 Voucher issuance engine</text>
  <text x="490" y="242" fill="#94a3b8" font-size="11">📡 Webhook handler + verifier</text>
  <text x="490" y="268" fill="#475569" font-size="10" font-style="italic">Deployed on Railway</text>
  <text x="490" y="282" fill="#475569" font-size="9">Express + TypeScript</text>

  <!-- Box 3: HSP Gateway -->
  <rect x="900" y="110" width="260" height="200" rx="12" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)" opacity="0.95"/>
  <rect x="900" y="110" width="260" height="36" rx="12" fill="#8b5cf6" fill-opacity="0.15"/>
  <rect x="900" y="134" width="260" height="1" fill="#8b5cf6" fill-opacity="0.3"/>
  <circle cx="922" cy="128" r="5" fill="#8b5cf6"/>
  <text x="938" y="132" fill="#a78bfa" font-size="13" font-weight="700" letter-spacing="1">HSP MERCHANT API</text>
  <text x="920" y="162" fill="#94a3b8" font-size="11">🏦 /merchant/orders (one-time)</text>
  <text x="920" y="182" fill="#94a3b8" font-size="11">♻️ /merchant/orders/reusable</text>
  <text x="920" y="202" fill="#94a3b8" font-size="11">📊 /merchant/payments (query)</text>
  <text x="920" y="222" fill="#94a3b8" font-size="11">🔐 EIP-712 wallet signatures</text>
  <text x="920" y="242" fill="#94a3b8" font-size="11">📤 Webhook dispatch engine</text>
  <text x="920" y="268" fill="#475569" font-size="10" font-style="italic">HashKey Merchant Gateway</text>
  <text x="920" y="282" fill="#475569" font-size="9">merchant-qa.hashkeymerchant.com</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Arrows Row 1                                          -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Agent A → Backend -->
  <line x1="300" y1="185" x2="470" y2="185" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowCyan)"/>
  <text x="385" y="175" text-anchor="middle" fill="#22d3ee" font-size="9" font-weight="600">GET /api/premium-data</text>

  <!-- Backend → Agent A (402) -->
  <line x1="470" y1="215" x2="300" y2="215" stroke="#f43f5e" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRose)"/>
  <text x="385" y="232" text-anchor="middle" fill="#fb7185" font-size="9" font-weight="600">← 402 Payment Required</text>

  <!-- Backend → HSP Gateway -->
  <line x1="730" y1="185" x2="900" y2="185" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowAmber)"/>
  <text x="815" y="175" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">POST /orders</text>
  <text x="815" y="188" text-anchor="middle" fill="#fbbf24" font-size="8">(HMAC + JWT)</text>

  <!-- HSP → Backend (payment_url) -->
  <line x1="900" y1="215" x2="730" y2="215" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowViolet)"/>
  <text x="815" y="232" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">← payment_url</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 2: Blockchain + Smart Contract                     -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- HashKey Chain Box -->
  <rect x="350" y="400" width="500" height="140" rx="12" fill="#0f172a" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)" opacity="0.95"/>
  <rect x="350" y="400" width="500" height="36" rx="12" fill="#10b981" fill-opacity="0.15"/>
  <rect x="350" y="424" width="500" height="1" fill="#10b981" fill-opacity="0.3"/>
  <circle cx="372" cy="418" r="5" fill="#10b981"/>
  <text x="388" y="422" fill="#34d399" font-size="13" font-weight="700" letter-spacing="1">HASHKEY CHAIN — TESTNET (Chain ID: 133)</text>

  <text x="385" y="455" fill="#94a3b8" font-size="11">💰 USDT Settlement Token: 0x3723...CC6</text>
  <text x="385" y="478" fill="#94a3b8" font-size="11">📄 Epochstream Router: 0x5765...F5C</text>
  <text x="385" y="501" fill="#94a3b8" font-size="11">🔗 Events: FundsLocked(intentId, buyer, seller, token, amount)</text>
  <text x="385" y="520" fill="#475569" font-size="10" font-style="italic">On-chain settlement with real USDT transfers</text>

  <!-- HSP → Blockchain -->
  <line x1="1030" y1="310" x2="1030" y2="370" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="1030" y1="370" x2="720" y2="370" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="720" y1="370" x2="720" y2="400" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowViolet)"/>
  <text x="875" y="365" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">Broadcasts USDT tx on-chain</text>

  <!-- Blockchain → Webhook (back to backend) -->
  <line x1="480" y1="400" x2="480" y2="370" stroke="#10b981" stroke-width="2"/>
  <line x1="480" y1="370" x2="180" y2="370" stroke="#10b981" stroke-width="2"/>
  <line x1="180" y1="370" x2="180" y2="310" stroke="#10b981" stroke-width="2"/>
  <!-- Flip this up to backend -->
  <!-- Actually route webhook from HSP to Backend -->

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ROW 3: Webhook + Data Delivery                         -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Webhook flow: HSP → Backend -->
  <rect x="40" y="580" width="260" height="110" rx="12" fill="#0f172a" stroke="#f43f5e" stroke-width="1.5" filter="url(#shadow)" opacity="0.95"/>
  <rect x="40" y="580" width="260" height="36" rx="12" fill="#f43f5e" fill-opacity="0.15"/>
  <rect x="40" y="604" width="260" height="1" fill="#f43f5e" fill-opacity="0.3"/>
  <circle cx="62" cy="598" r="5" fill="#f43f5e"/>
  <text x="78" y="602" fill="#fb7185" font-size="13" font-weight="700" letter-spacing="1">WEBHOOK HANDLER</text>
  <text x="60" y="632" fill="#94a3b8" font-size="11">🔒 HMAC-SHA256 validation</text>
  <text x="60" y="652" fill="#94a3b8" font-size="11">🎫 Voucher issuance on success</text>
  <text x="60" y="672" fill="#94a3b8" font-size="11">🔗 TX hash extraction + logging</text>

  <!-- Data Delivery -->
  <rect x="470" y="580" width="260" height="110" rx="12" fill="#0f172a" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)" opacity="0.95"/>
  <rect x="470" y="580" width="260" height="36" rx="12" fill="#10b981" fill-opacity="0.15"/>
  <rect x="470" y="604" width="260" height="1" fill="#10b981" fill-opacity="0.3"/>
  <circle cx="492" cy="598" r="5" fill="#10b981"/>
  <text x="508" y="602" fill="#34d399" font-size="13" font-weight="700" letter-spacing="1">AGENT B — SELLER API</text>
  <text x="490" y="632" fill="#94a3b8" font-size="11">⚡ Premium Trading Signals</text>
  <text x="490" y="652" fill="#94a3b8" font-size="11">🚗 EV Charging Receipts (DePIN)</text>
  <text x="490" y="672" fill="#94a3b8" font-size="11">🤖 AI Compute Invoices (SaaS)</text>

  <!-- Use Case Badges -->
  <rect x="900" y="580" width="260" height="110" rx="12" fill="#0f172a" stroke="#64748b" stroke-width="1" filter="url(#shadow)" opacity="0.95"/>
  <rect x="900" y="580" width="260" height="36" rx="12" fill="#64748b" fill-opacity="0.1"/>
  <rect x="900" y="604" width="260" height="1" fill="#64748b" fill-opacity="0.2"/>
  <text x="1030" y="602" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700" letter-spacing="1">USE CASES</text>
  <rect x="916" y="618" width="78" height="22" rx="6" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="0.8"/>
  <text x="955" y="633" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="600">DeFi</text>
  <rect x="1004" y="618" width="78" height="22" rx="6" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="0.8"/>
  <text x="1043" y="633" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">DePIN</text>
  <rect x="1092" y="618" width="56" height="22" rx="6" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="1120" y="633" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">SaaS</text>
  <text x="1030" y="666" text-anchor="middle" fill="#64748b" font-size="10">Same HSP payment flow</text>
  <text x="1030" y="680" text-anchor="middle" fill="#64748b" font-size="10">across all verticals</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Connecting arrows (rows)                               -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Webhook: Blockchain → Webhook handler -->
  <path d="M 420 540 L 420 560 Q 420 570 410 570 L 310 570 Q 300 570 300 580 L 300 580" stroke="#f43f5e" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowRose)"/>
  <text x="350" y="555" text-anchor="middle" fill="#fb7185" font-size="9" font-weight="600">Webhook POST</text>

  <!-- Webhook handler → Seller API -->
  <line x1="300" y1="635" x2="470" y2="635" stroke="#10b981" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowEmerald)"/>
  <text x="385" y="625" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">Voucher validated →</text>
  <text x="385" y="650" text-anchor="middle" fill="#34d399" font-size="9">200 OK + Data</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowViolet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f43f5e"/>
    </marker>
    <marker id="arrowEmerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
  </defs>
</svg>
